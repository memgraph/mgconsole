name: CI

on: 
  push:
  workflow_dispatch:

env:
  OFFICIAL: true

jobs:
  build_and_test_ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Set up and check memgraph download link
        run: |
          mg_version="3.7.2"
          mg_version_short=${mg_version%%-*}
          if [ "${{ env.OFFICIAL }}" = "true" ]; then
            mg_url="https://download.memgraph.com/memgraph/v${mg_version}/ubuntu-24.04/memgraph_${mg_version_short}-1_amd64.deb"
          else
            mg_url="https://s3.eu-west-1.amazonaws.com/deps.memgraph.io/memgraph/v${mg_version}/ubuntu-24.04/memgraph_${mg_version_short}-1_amd64.deb"
          fi
          echo "Checking Memgraph download link: $mg_url"
          if curl --output /dev/null --silent --head --fail $mg_url; then
            echo "Memgraph download link is valid"
            echo "MEMGRAPH_DOWNLOAD_LINK=${mg_url}" >> $GITHUB_ENV 
          else
            echo "Memgraph download link is not valid"
            exit 1
          fi
      - name: Install dependencies
        run: |
          sudo apt install -y git cmake make gcc g++ libssl-dev ninja-build # mgconsole deps
          sudo apt install -y libpython3.12 python3-pip # memgraph deps
          mkdir ~/memgraph
          curl -L ${{ env.MEMGRAPH_DOWNLOAD_LINK }} > ~/memgraph/memgraph_${mg_version}-1_amd64.deb
          sudo systemctl mask memgraph
          sudo dpkg -i ~/memgraph/memgraph_${mg_version}-1_amd64.deb
      - uses: actions/checkout@v4
      - name: Install and test mgconsole
        run: |
          cmake -B build -G Ninja
          cmake --build build
          sudo cmake --install build
          ctest --verbose
      - name: Save mgconsole test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "mgconsole_ctest.log"
          path: build/Testing/Temporary/LastTest.log 

  build_windows_mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Set-up repository
        uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
      - name: Build and install mgconsole
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release .
          cmake --build build --parallel
          cmake --install build
      - name: Save mgconsole Windows build
        uses: actions/upload-artifact@v4
        with:
          name: "mgconsole Windows build"
          path: build/src/mgconsole.exe

  build_apple:
    runs-on: macos-latest
    steps:
      - name: Set-up repository
        uses: actions/checkout@v4
      # NOTE: CI can't execute end2end tests because there is no way to run
      #       Memgraph on CI MacOS machines.
      - name: Install openssl
        run: |
          brew update
          brew install openssl
      - name: Build mgconsole
        run: |
          cmake -B build -G Ninja -DOPENSSL_ROOT_DIR="$(brew --prefix openssl)" -DCMAKE_BUILD_TYPE=Release .
          cmake --build build
      - name: Save mgconsole MacOS build
        uses: actions/upload-artifact@v4
        with:
          name: "mgconsole MacOS build"
          path: build/src/mgconsole
